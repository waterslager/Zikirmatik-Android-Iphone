<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    touch-action: manipulation;
    overscroll-behavior: none;

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  button {
    -webkit-tap-highlight-color: transparent;
    outline: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  button:focus { outline: none; }

  .device-wrap {

    width: 300px;
    height: 389px;
    filter: drop-shadow(0 0 13px rgba(40,100,158,0.5)) drop-shadow(0 18px 30px rgba(0,0,0,0.7));
  }

    inset: 0;
    background: #060606;

  /* ---------- LCD EKRAN: verilen dosyadaki renk semasi ---------- */
  .screen {
    position: absolute;
    left: 59px; top: 66px;
    width: 182px; height: 62px;
    background: #013220;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow:
      inset 0 0 16px rgba(0,0,0,0.7),
      inset 0 0 3px rgba(0,120,70,0.2),
      0 0 7px rgba(0,120,70,0.15);
    border: 2px solid #0b5e3e;
  }

  .digits { display: flex; align-items: center; }

  .lcd-digit { position: relative; width: 20px; height: 36px; margin: 0 2px; }

  .lcd-digit .seg { position: absolute; background: transparent; opacity: 0; }
  .lcd-digit .seg.on {
    background: #00e676;
    opacity: 1;
    box-shadow:
      0 0 6px rgba(0,230,118,0.95),
      0 0 14px rgba(0,230,118,0.6),
      0 0 28px rgba(0,230,118,0.3);
  }

  .seg-a, .seg-g, .seg-d {
    left: 2.2px; width: 15.4px; height: 3.9px;
    clip-path: polygon(12% 0%, 88% 0%, 100% 50%, 88% 100%, 12% 100%, 0% 50%);
  }
  .seg-a { top: 0; }
  .seg-g { top: 16.1px; }
  .seg-d { top: 32.1px; }

  .seg-f, .seg-b, .seg-e, .seg-c {
    width: 3.9px; height: 13.8px;
    clip-path: polygon(0% 12%, 50% 0%, 100% 12%, 100% 88%, 50% 100%, 0% 88%);
  }
  .seg-f { top: 1.9px; left: 0; }
  .seg-b { top: 1.9px; right: 0; }
  .seg-e { top: 19.3px; left: 0; }
  .seg-c { top: 19.3px; right: 0; }

  /* "1" rakami sadece sag dikey cubuklari (b,c) kullandigi icin kutu icinde
     saga yasli goruntu verip komsu rakamlarla dengesiz bosluk olusturuyordu.
     Bu rakam icin kutuyu daraltip cubuklari kutunun ortasina aliyoruz, ayrica
     cubuklari tam yukseklige uzatarak diger rakamlarla ayni boyda gorunmesini
     sagliyoruz. */
  .lcd-digit.digit-one { width: 11px; }
  .lcd-digit.digit-one .seg-b,
  .lcd-digit.digit-one .seg-c {
    left: 3.55px; right: auto; height: 16px;
  }
  .lcd-digit.digit-one .seg-b { top: 0; }
  .lcd-digit.digit-one .seg-c { top: 20px; }

  /* ---------- IKON BUTONLARI ---------- */
  .icon-btn {
    position: absolute;
    top: 160px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #3d63b8, #101d40 75%);
    border: none;
    box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active { box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
  .icon-btn svg { width: 23px; height: 23px; }
  .icon-left { left: 59px; }
  .icon-mid { left: 203px; }

  /* Ikon butonlarinin ustundeki etiketler - KAYDET yazisiyla ayni renk/font */
  .btn-label {
    position: absolute;
    top: 148px;
    transform: translateX(-50%);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.5rem;
    font-weight: bold;
    letter-spacing: 1.5px;
    color: #5bb0f8;
    white-space: nowrap;
    text-shadow: 0 0 5px rgba(91,176,248,0.5);
    pointer-events: none;
  }
  .label-left { left: 78px; }
  .label-mid { left: 222px; }

  .count-btn {
    position: absolute;
    left: 93.6px; top: 219px;
    width: 113px; height: 113px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2c4a8a, #0a1230 75%);
    border: none;
    box-shadow: 0 8px 16px rgba(0,0,0,0.7);
    cursor: pointer;
    transform: none !important;
  }
  .count-btn:active { box-shadow: inset 0 3px 10px rgba(0,0,0,0.6); transform: none !important; }

  /* sayma butonu ustundeki kavisli (oval) yazi icin SVG konteynir */
  .count-badge-svg {
    position: absolute;
    top: 0; left: 0;
    width: 113px; height: 113px;
    pointer-events: none;
  }
  .count-badge-svg text {
    font-family: 'Times New Roman', Times, serif;
    font-weight: bold;
    font-size: 11px;
    letter-spacing: 2px;
    fill: #5bb0f8;
  }

  /* sayma butonu icinde ortali 100 + ses uyari sembolu - LCD ekranin rengiyle eslesir */
  .count-alert {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 0;
    pointer-events: none;
  }
  .count-alert .count-100 {
    font-family: Arial, sans-serif;
    font-weight: bold;
    font-size: 0.78rem;
    color: #0f8a52;
    text-shadow: 0 0 5px rgba(15,138,82,0.7);
  }
  .count-alert svg { width: 22px; height: 22px; }

  .memory-label {
    position: absolute;
    left: 150px; top: 348px;
    transform: translateX(-50%);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.68rem;
    font-weight: bold;
    letter-spacing: 2px;
    color: #5bb0f8;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(91,176,248,0.5);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    transition: all 0.2s;
  }
  .memory-label:active { transform: translateX(-50%) scale(0.95); color: #88ccff; }

  .saved-toast {
    position: absolute;
    left: 150px; top: 348px;
    transform: translate(-50%, 17px);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.62rem;
    color: #7CFC9A;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .saved-toast.show { opacity: 1; }
</style>

<body>

<div class="device-wrap">
  <div class="outer-shape"></div>
  <div class="zikirmatik-body">
    <div class="screen" id="screen">
      <div class="digits" id="display"></div>
    </div>

    <div class="btn-label label-left">GERİ</div>
    <div class="btn-label label-mid">RESET</div>

    <button class="icon-btn icon-left" id="btn-undo" title="Geri al">

        <path d="M1 4v6h6"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="icon-btn icon-mid" id="btn-reset" title="Sıfırla">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
        <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
      </svg>
    </button>

    <button class="count-btn" id="btn-count">
      <svg class="count-badge-svg" viewBox="0 0 113 113">
        <text text-anchor="middle" x="34.9" y="15.9" transform="rotate(-28 34.9 15.9)">S</text>
        <text text-anchor="middle" x="45.4" y="11.9" transform="rotate(-14 45.4 11.9)">A</text>

        <text text-anchor="middle" x="78.1" y="15.9" transform="rotate(28 78.1 15.9)">Ç</text>
      </svg>
      <span class="count-alert">
        <span class="count-100">100</span>
        <svg viewBox="4.5 5 18 18" fill="none" stroke="#0f8a52" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 14 A7 7 0 0 1 14 7"/>

          <path d="M21 22 A15 15 0 0 1 6 7"/>
          <circle cx="21" cy="7" r="1.5" fill="#0f8a52" stroke="none"/>
        </svg>
      </span>
    </button>

    <div class="memory-label" id="memoryLabel">KAYDET</div>
    <div class="saved-toast" id="savedToast">kaydedildi</div>
  </div>
</div>

<script>
  let counter = 0;
  const TARGET = 100; // her 100 zikirde sesli uyari
  const display = document.getElementById('display');

  const saved = localStorage.getItem('zikirmatikCount');
  if (saved !== null && !isNaN(parseInt(saved))) {
    counter = parseInt(saved);
  }

  const SEGMENTS = {
    '0': ['a','b','c','d','e','f'],
    '1': ['b','c'],
    '2': ['a','b','g','e','d'],
    '3': ['a','b','g','c','d'],
    '4': ['f','g','b','c'],
    '5': ['a','f','g','c','d'],
    '6': ['a','f','g','e','c','d'],
    '7': ['a','b','c'],
    '8': ['a','b','c','d','e','f','g'],
    '9': ['a','b','c','d','f','g']
  };

  function makeDigit(ch, ghost) {
    const digit = document.createElement('div');
    digit.className = 'lcd-digit' + (!ghost && ch === '1' ? ' digit-one' : '');
    const active = ghost ? [] : (SEGMENTS[ch] || []);
    ['a','b','c','d','e','f','g'].forEach(s => {
      const seg = document.createElement('div');
      seg.className = 'seg seg-' + s + (active.includes(s) ? ' on' : '');
      digit.appendChild(seg);
    });
    return digit;
  }

  function updateDisplay() {
    display.innerHTML = '';
    const digitsStr = String(counter);
    const padCount = Math.max(0, 6 - digitsStr.length);
    const full = '0'.repeat(padCount) + digitsStr;
    for (let i = 0; i < 6; i++) {
      const isGhost = i < padCount;
      display.appendChild(makeDigit(full[i], isGhost));
    }

  let alertAudio = null;
  function beep() {
    try {
      if (!alertAudio) {
        alertAudio = new Audio("data:audio/aac;base64," + ALERT_SOUND_B64);
      }
      alertAudio.currentTime = 0;
      alertAudio.play().catch(() => {});
    } catch (e) {}
  }

  function count() {
    counter++;
    updateDisplay();
    if (counter % TARGET === 0) {
      beep();
      if (navigator.vibrate) navigator.vibrate(200);
    }
  }

  function resetCounter() {
    counter = 0;
    updateDisplay();
  }

  function undoCount() {
    counter = Math.max(0, counter - 1);
    updateDisplay();
  }

  function saveMemory() {
    localStorage.setItem('zikirmatikCount', counter);
    const toast = document.getElementById('savedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  }

  // Aninda tepki icin pointerdown kullaniliyor (click gecikmesi olmadan)
  function bindFast(el, handler) {
    if (!el) return;
    el.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      handler();
    }, { passive: false });
  }
  bindFast(document.getElementById('btn-undo'), undoCount);
  bindFast(document.getElementById('btn-reset'), resetCounter);
  bindFast(document.getElementById('btn-count'), count);
  bindFast(document.getElementById('memoryLabel'), saveMemory);

  // Cihazi ekrana sigacak sekilde buyutme
  function fitDevice() {
    const wrap = document.querySelector('.device-wrap');
    const maxW = window.innerWidth * 0.9;
    const maxH = window.innerHeight * 0.9;
    const scale = Math.min(maxW / 300, maxH / 389, 3);
    wrap.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', fitDevice);
  fitDevice();

  updateDisplay();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
