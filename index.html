<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
<title>Zikirmatik</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">

<!-- Android / Chrome "Ana ekrana ekle" ikonu -->
<link rel="icon" href="192.png">

<!-- iOS ana ekrana ekleme destegi -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zikirmatik">
<link rel="apple-touch-icon" href="192.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  button {
    -webkit-tap-highlight-color: transparent;
    outline: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  button:focus { outline: none; }

  .device-wrap {
    position: relative;
    width: 300px;
    height: 389px;
    filter: drop-shadow(0 0 13px rgba(40,100,158,0.5)) drop-shadow(0 18px 30px rgba(0,0,0,0.7));
  }

  /* dis hat (mavi) - resimden cikarilan gercek kontur */
  .outer-shape {
    position: absolute;
    inset: 0;
    background: #3a78b8;
    clip-path: path('M 104.0 3.5 C 93.2 5.7, 78.7 9.3, 68.2 13.2 C 57.7 17.1, 48.7 22.0, 41.2 27.0 C 33.7 32.0, 27.6 38.2, 23.2 43.0 C 18.8 47.8, 17.4 50.6, 14.8 55.9 C 12.2 61.2, 10.0 61.5, 7.5 74.8 C 5.0 88.0, 0.9 119.0, 0.0 135.4 C -0.9 151.8, 0.7 161.3, 2.2 173.4 C 3.7 185.5, 5.2 193.7, 9.1 208.0 C 13.0 222.3, 22.2 241.3, 25.8 259.2 C 29.4 277.1, 28.5 302.9, 30.5 315.4 C 32.5 327.9, 34.7 328.5, 37.7 334.2 C 40.7 339.9, 43.2 343.7, 48.4 349.3 C 53.6 354.9, 62.4 363.1, 69.1 367.9 C 75.8 372.7, 78.2 374.5, 88.6 377.9 C 99.0 381.2, 118.7 386.3, 131.3 388.0 C 143.9 389.7, 154.2 388.8, 164.0 388.3 C 173.8 387.8, 180.9 387.1, 190.1 384.8 C 199.3 382.6, 211.7 377.9, 219.0 374.8 C 226.3 371.7, 228.6 370.2, 234.0 366.0 C 239.4 361.8, 246.1 356.8, 251.6 349.6 C 257.1 342.4, 263.4 332.9, 267.0 322.9 C 270.6 312.8, 271.7 300.0, 273.0 289.3 C 274.3 278.6, 271.3 273.1, 274.6 258.5 C 277.9 243.9, 288.9 215.7, 292.8 201.7 C 296.7 187.7, 296.6 185.2, 297.8 174.3 C 299.0 163.4, 300.6 151.4, 300.0 136.0 C 299.4 120.6, 296.4 95.1, 294.0 82.0 C 291.6 68.9, 289.0 64.4, 285.9 57.5 C 282.8 50.6, 280.0 46.0, 275.2 40.8 C 270.4 35.6, 264.4 30.7, 257.3 26.1 C 250.2 21.6, 240.7 16.9, 232.5 13.5 C 224.3 10.2, 218.0 8.2, 208.3 6.0 C 198.6 3.9, 186.8 1.6, 174.3 0.6 C 161.8 -0.4, 144.9 -0.5, 133.2 0.0 C 121.5 0.5, 114.8 1.3, 104.0 3.5 Z');
  }

  /* ic gövde (siyah) - dis hattan 9.5px iceri offsetli, ayni kontur stiliyle */
  .zikirmatik-body {
    position: absolute;
    inset: 0;
    background: #060606;
    clip-path: path('M 105.8 12.8 C 95.5 14.9, 81.5 18.4, 71.6 22.1 C 61.7 25.7, 53.4 30.3, 46.6 34.8 C 39.7 39.4, 34.3 45.0, 30.4 49.2 C 26.5 53.4, 25.5 55.6, 23.3 60.2 C 21.0 64.9, 19.0 64.5, 16.7 77.1 C 14.4 89.7, 10.3 119.9, 9.5 135.7 C 8.6 151.6, 10.2 160.5, 11.6 172.2 C 13.1 183.8, 14.4 191.4, 18.3 205.6 C 22.2 219.8, 31.5 239.4, 35.1 257.3 C 38.7 275.3, 37.9 301.2, 39.8 313.3 C 41.6 325.4, 43.5 324.8, 46.1 329.7 C 48.7 334.7, 50.8 337.9, 55.5 343.0 C 60.2 348.0, 68.4 355.7, 74.5 360.1 C 80.6 364.4, 82.2 365.9, 91.9 369.0 C 101.5 372.1, 120.5 376.9, 132.4 378.6 C 144.4 380.2, 154.2 379.3, 163.4 378.8 C 172.7 378.3, 179.3 377.7, 187.9 375.6 C 196.5 373.4, 208.3 369.0, 215.0 366.2 C 221.8 363.3, 223.5 362.1, 228.3 358.4 C 233.2 354.6, 239.2 350.1, 244.2 343.7 C 249.1 337.2, 254.8 328.9, 258.1 319.6 C 261.3 310.4, 262.4 298.7, 263.6 288.2 C 264.8 277.7, 261.9 271.6, 265.3 256.8 C 268.6 242.0, 279.7 213.3, 283.6 199.4 C 287.4 185.5, 287.2 183.7, 288.4 173.2 C 289.5 162.6, 291.1 151.1, 290.5 136.3 C 289.9 121.4, 286.9 96.5, 284.7 84.0 C 282.5 71.6, 280.1 67.7, 277.3 61.6 C 274.6 55.4, 272.3 51.7, 268.1 47.1 C 263.9 42.5, 258.6 38.2, 252.1 34.1 C 245.6 29.9, 236.6 25.4, 228.9 22.3 C 221.3 19.2, 215.4 17.3, 206.1 15.3 C 196.9 13.2, 185.6 11.0, 173.5 10.1 C 161.4 9.1, 145.0 9.0, 133.7 9.5 C 122.4 9.9, 116.2 10.7, 105.8 12.8 Z');
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- LCD EKRAN: verilen dosyadaki renk semasi ---------- */
  .screen {
    position: absolute;
    left: 59px; top: 66px;
    width: 182px; height: 62px;
    background: #1a4a4a;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow:
      inset 0 0 16px rgba(0,0,0,0.7),
      inset 0 0 3px rgba(0,255,180,0.15),
      0 0 7px rgba(0,255,200,0.1);
    border: 2px solid #2a5a5a;
  }

  /* LED ON durumu */
  .screen.led-on {
    background: #00ffff;
    box-shadow:
      inset 0 0 25px rgba(255,255,255,0.5),
      0 0 17px rgba(0,255,255,0.4),
      0 0 34px rgba(0,255,255,0.2);
    border-color: #88ffff;
  }

  .digits { display: flex; align-items: center; }

  .lcd-digit { position: relative; width: 20px; height: 36px; margin: 0 2px; }

  .lcd-digit .seg { position: absolute; background: transparent; opacity: 0; }
  .lcd-digit .seg.on {
    background: #00ffaa;
    opacity: 1;
    box-shadow:
      0 0 6px rgba(0,255,170,0.95),
      0 0 14px rgba(0,255,170,0.6),
      0 0 28px rgba(0,255,170,0.3);
  }

  /* LED acikken aktif segmentler koyulasip kontrast saglar */
  .screen.led-on .lcd-digit .seg.on {
    background: #004444;
    box-shadow: none;
  }

  .seg-a, .seg-g, .seg-d {
    left: 2.2px; width: 15.4px; height: 3.9px;
    clip-path: polygon(12% 0%, 88% 0%, 100% 50%, 88% 100%, 12% 100%, 0% 50%);
  }
  .seg-a { top: 0; }
  .seg-g { top: 16.1px; }
  .seg-d { top: 32.1px; }

  .seg-f, .seg-b, .seg-e, .seg-c {
    width: 3.9px; height: 13.8px;
    clip-path: polygon(0% 12%, 50% 0%, 100% 12%, 100% 88%, 50% 100%, 0% 88%);
  }
  .seg-f { top: 1.9px; left: 0; }
  .seg-b { top: 1.9px; right: 0; }
  .seg-e { top: 19.3px; left: 0; }
  .seg-c { top: 19.3px; right: 0; }

  /* "1" rakami sadece sag dikey cubuklari (b,c) kullandigi icin kutu icinde
     saga yasli goruntu verip komsu rakamlarla dengesiz bosluk olusturuyordu.
     Bu rakam icin kutuyu daraltip cubuklari kutunun ortasina aliyoruz, ayrica
     cubuklari tam yukseklige uzatarak diger rakamlarla ayni boyda gorunmesini
     sagliyoruz. */
  .lcd-digit.digit-one { width: 11px; }
  .lcd-digit.digit-one .seg-b,
  .lcd-digit.digit-one .seg-c {
    left: 3.55px; right: auto; height: 16px;
  }
  .lcd-digit.digit-one .seg-b { top: 0; }
  .lcd-digit.digit-one .seg-c { top: 20px; }

  /* ---------- IKON BUTONLARI ---------- */
  .icon-btn {
    position: absolute;
    top: 152px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #3d63b8, #101d40 75%);
    border: none;
    box-shadow: 0 3px 6px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.25);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active { box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
  .icon-btn svg { width: 23px; height: 23px; }
  .icon-left { left: 41px; }
  .icon-mid { left: 131px; }
  .icon-right { left: 221px; }

  /* LED ampul ikonu */
  .icon-btn .led-icon { width: 25px; height: 25px; }

  .count-btn {
    position: absolute;
    left: 93.6px; top: 219px;
    width: 113px; height: 113px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #2c4a8a, #0a1230 75%);
    border: none;
    box-shadow: 0 8px 16px rgba(0,0,0,0.7), inset 0 2px 5px rgba(255,255,255,0.18);
    cursor: pointer;
    transform: none !important;
  }
  .count-btn:active { box-shadow: inset 0 3px 10px rgba(0,0,0,0.6); transform: none !important; }

  .memory-label {
    position: absolute;
    left: 150px; top: 348px;
    transform: translateX(-50%);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.68rem;
    font-weight: bold;
    letter-spacing: 2px;
    color: #5bb0f8;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(91,176,248,0.5);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    transition: all 0.2s;
  }
  .memory-label:active { transform: translateX(-50%) scale(0.95); color: #88ccff; }

  .saved-toast {
    position: absolute;
    left: 150px; top: 348px;
    transform: translate(-50%, 17px);
    font-family: 'Times New Roman', Times, serif;
    font-size: 0.62rem;
    color: #7CFC9A;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .saved-toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="device-wrap">
  <div class="outer-shape"></div>
  <div class="zikirmatik-body">
    <div class="screen" id="screen">
      <div class="digits" id="display"></div>
    </div>

    <button class="icon-btn icon-left" id="btn-undo" title="Geri al">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="icon-btn icon-mid" id="btn-reset" title="Sıfırla">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/>
        <path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
        <path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/>
      </svg>
    </button>
    <button class="icon-btn icon-right" id="btn-led" title="LED">
      <svg class="led-icon" viewBox="0 0 64 64" fill="none" stroke="#FFC72C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="32" y1="2" x2="32" y2="11"/>
        <line x1="9" y1="9" x2="15.5" y2="15.5"/>
        <line x1="55" y1="9" x2="48.5" y2="15.5"/>
        <line x1="3" y1="31" x2="12" y2="31"/>
        <line x1="61" y1="31" x2="52" y2="31"/>
        <path d="M20 31c0-7 5.4-12.5 12-12.5S44 24 44 31c0 5.6-3.6 8.7-5.6 12-1 1.7-1.6 3.4-1.6 6.5H27.2c0-3.1-.6-4.8-1.6-6.5-2-3.3-5.6-6.4-5.6-12z"/>
        <path d="M27.5 24.5c1.2-2.7 3.6-4.3 4.6-1.8 1 2.5-1.8 4.3-.8 7.3"/>
        <line x1="24.5" y1="52.5" x2="39.5" y2="52.5"/>
        <line x1="25.5" y1="57" x2="38.5" y2="57"/>
      </svg>
    </button>

    <button class="count-btn" id="btn-count"></button>

    <div class="memory-label" id="memoryLabel">KAYDET</div>
    <div class="saved-toast" id="savedToast">kaydedildi</div>
  </div>
</div>

<script>
  let counter = 0;
  let ledOn = false;
  const TARGET = 100; // her 100 zikirde sesli uyari
  const display = document.getElementById('display');
  const screenEl = document.getElementById('screen');

  const saved = localStorage.getItem('zikirmatikCount');
  if (saved !== null && !isNaN(parseInt(saved))) {
    counter = parseInt(saved);
  }

  const SEGMENTS = {
    '0': ['a','b','c','d','e','f'],
    '1': ['b','c'],
    '2': ['a','b','g','e','d'],
    '3': ['a','b','g','c','d'],
    '4': ['f','g','b','c'],
    '5': ['a','f','g','c','d'],
    '6': ['a','f','g','e','c','d'],
    '7': ['a','b','c'],
    '8': ['a','b','c','d','e','f','g'],
    '9': ['a','b','c','d','f','g']
  };

  function makeDigit(ch, ghost) {
    const digit = document.createElement('div');
    digit.className = 'lcd-digit' + (!ghost && ch === '1' ? ' digit-one' : '');
    const active = ghost ? [] : (SEGMENTS[ch] || []);
    ['a','b','c','d','e','f','g'].forEach(s => {
      const seg = document.createElement('div');
      seg.className = 'seg seg-' + s + (active.includes(s) ? ' on' : '');
      digit.appendChild(seg);
    });
    return digit;
  }

  function updateDisplay() {
    display.innerHTML = '';
    const digitsStr = String(counter);
    const padCount = Math.max(0, 6 - digitsStr.length);
    const full = '0'.repeat(padCount) + digitsStr;
    for (let i = 0; i < 6; i++) {
      const isGhost = i < padCount;
      display.appendChild(makeDigit(full[i], isGhost));
    }
  }

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.4);
    } catch (e) {}
  }

  function count() {
    counter++;
    updateDisplay();
    if (counter % TARGET === 0) {
      beep();
      if (navigator.vibrate) navigator.vibrate(200);
    }
  }

  function resetCounter() {
    counter = 0;
    updateDisplay();
  }

  function undoCount() {
    counter = Math.max(0, counter - 1);
    updateDisplay();
  }

  function toggleLed() {
    ledOn = !ledOn;
    screenEl.classList.toggle('led-on', ledOn);
  }

  function saveMemory() {
    localStorage.setItem('zikirmatikCount', counter);
    const toast = document.getElementById('savedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  }

  // Aninda tepki icin pointerdown kullaniliyor (click gecikmesi olmadan)
  function bindFast(el, handler) {
    if (!el) return;
    el.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      handler();
    }, { passive: false });
  }
  bindFast(document.getElementById('btn-undo'), undoCount);
  bindFast(document.getElementById('btn-reset'), resetCounter);
  bindFast(document.getElementById('btn-led'), toggleLed);
  bindFast(document.getElementById('btn-count'), count);
  bindFast(document.getElementById('memoryLabel'), saveMemory);

  // Cihazi ekrana sigacak sekilde buyutme
  function fitDevice() {
    const wrap = document.querySelector('.device-wrap');
    const maxW = window.innerWidth * 0.9;
    const maxH = window.innerHeight * 0.9;
    const scale = Math.min(maxW / 300, maxH / 389, 3);
    wrap.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', fitDevice);
  fitDevice();

  updateDisplay();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
